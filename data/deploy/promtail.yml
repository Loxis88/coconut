server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: kuper
    journal:
      max_age: 48h
      labels:
        job: kuper
    relabel_configs:
      - source_labels: [__journal_syslog_identifier]
        target_label: unit
