name: coconut_flutter
description: Cross-platform Flutter migration of the Coconut Android app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^9.2.2
  app_links: ^6.1.1
  http: ^1.2.2
  mobile_scanner: ^5.2.3
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
