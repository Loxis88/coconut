name: Deploy Landing

on:
  push:
    branches: [ "main" ]
    paths: [ "landing/**" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Landing Page
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: landing/package-lock.json

    - name: Install Dependencies
      run: |
        cd landing
        npm ci

    - name: Build Project
      run: |
        cd landing
        npm run build

    - name: Prepare server directory
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo mkdir -p /var/www/coconut-landing
          sudo chown -R $USER:$USER /var/www/coconut-landing

    - name: Copy files via SSH
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "landing/dist/*"
        target: "/var/www/coconut-landing"
        strip_components: 2

    - name: Reload Caddy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo systemctl reload caddy || true
