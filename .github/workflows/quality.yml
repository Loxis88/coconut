name: Quality Gates

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  flutter-checks:
    name: Flutter Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: |
          cd flutter
          flutter pub get --enforce-lockfile
      - name: Format
        run: |
          cd flutter
          dart format --set-exit-if-changed .
      - name: Analyze
        run: |
          cd flutter
          flutter analyze
      - name: Test
        run: |
          cd flutter
          flutter test
      - name: Build Debug APK
        run: |
          cd flutter
          flutter build apk --debug

  go-checks:
    name: Go Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum
      - name: Format
        run: |
          cd backend
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted properly:"
            gofmt -l .
            exit 1
          fi
      - name: Vet
        run: |
          cd backend
          go vet ./...
      - name: Test
        run: |
          cd backend
          go test -v ./...

  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scanners: 'secret'
          severity: 'HIGH,CRITICAL'
          exit-code: 1
          format: 'table'

  dependency-checks:
    name: Dependency Scanning (Informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Vulnerability Scanning
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'
          exit-code: 1
          format: 'table'
