name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/**", "codex/**", "flutter", "new-reference" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy-backend:
    name: Build & Deploy Go Backend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache-dependency-path: backend/go.sum

    - name: Test Backend
      run: |
        cd backend
        go test -v ./...

    - name: Build Backend Binary
      run: |
        cd backend
        GOOS=linux GOARCH=amd64 go build -o api cmd/api/main.go

    - name: Deploy to Server via SSH
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/flutter')
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "backend/api,backend/deploy/coconut-backend.service"
        target: "/tmp/coconut_deploy"

    - name: Restart Systemd Service
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/flutter')
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Stop service if it's already running to prevent 'Text file busy' error
          sudo systemctl stop coconut-backend.service || true

          # Create directory structure
          sudo mkdir -p /opt/coconut/backend

          # Create .env file with default credentials so the app doesn't crash on startup
          # The user should update this manually on the server for production
          sudo bash -c 'cat << EOF > /opt/coconut/backend/.env
          PORT=8080
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          EOF'

          # Remove old binary to ensure clean replace
          sudo rm -f /opt/coconut/backend/api

          # Move binary and set permissions
          sudo mv /tmp/coconut_deploy/backend/api /opt/coconut/backend/api
          sudo chmod +x /opt/coconut/backend/api

          # Move systemd service file
          sudo mv /tmp/coconut_deploy/backend/deploy/coconut-backend.service /etc/systemd/system/coconut-backend.service

          # Reload daemon and restart service
          sudo systemctl daemon-reload
          sudo systemctl enable coconut-backend.service
          sudo systemctl restart coconut-backend.service

          # Clean up
          rm -rf /tmp/coconut_deploy



  deploy-data-scripts:
    name: Deploy Data Scripts
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Copy scripts to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "data/*.py,data/dds/*.py,data/staging/*.py,data/requirements.txt"
        target: "/tmp/coconut_data_deploy"

    - name: Install and restart services
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo mkdir -p /opt/coconut/data/dds /opt/coconut/data/staging

          # Обновить скрипты (config.json и cookies.json остаются нетронутыми)
          sudo cp /tmp/coconut_data_deploy/data/*.py /opt/coconut/data/
          sudo cp /tmp/coconut_data_deploy/data/dds/*.py /opt/coconut/data/dds/
          sudo cp /tmp/coconut_data_deploy/data/staging/*.py /opt/coconut/data/staging/
          sudo cp /tmp/coconut_data_deploy/data/requirements.txt /opt/coconut/data/

          # Создать venv если не существует
          if [ ! -f /opt/coconut/data/.venv/bin/pip ]; then
            sudo python3 -m venv /opt/coconut/data/.venv
          fi

          # Установить/обновить зависимости
          sudo /opt/coconut/data/.venv/bin/pip install -q -r /opt/coconut/data/requirements.txt

          # Перезапустить 24/7 сервисы если они уже существуют
          sudo systemctl restart kuper-parser || true
          sudo systemctl restart kuper-enricher || true

          rm -rf /tmp/coconut_data_deploy

  build-flutter-android-apk:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Install Flutter dependencies
      run: |
        cd flutter
        flutter pub get

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
      run: |
        cd flutter/android/app
        echo "$ENCODED_STRING" | base64 --decode > debug.keystore

    - name: Build Flutter Debug APK
      run: |
        cd flutter
        flutter build apk --debug \
          --dart-define=BACKEND_URL=http://62.233.43.33:8080

    - name: Rename Flutter APK
      run: |
        mkdir -p build-artifacts
        cp flutter/build/app/outputs/flutter-apk/app-debug.apk build-artifacts/coconut-flutter-debug.apk

    - name: Upload Flutter APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: coconut-flutter-debug
        path: build-artifacts/coconut-flutter-debug.apk

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-flutter-android-apk
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download APK artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts

    - name: Move latest-beta tag to this commit (if not a tag push)
      if: "!startsWith(github.ref, 'refs/tags/')"
      run: |
        git tag -f latest-beta "$GITHUB_SHA"
        git push origin refs/tags/latest-beta --force

    - name: Publish Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "release-artifacts/**/*.apk"
        name: "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Beta' }}"
        tag: "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest-beta' }}"
        body: |
          Release artifacts for Coconut.

          - `coconut-flutter-debug.apk`: migrated Flutter Android build.

          Updated from `${{ github.ref_name }}` at `${{ github.sha }}`.
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
