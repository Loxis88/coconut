name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-deploy-backend:
    name: Build & Deploy Go Backend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache-dependency-path: backend/go.sum

    - name: Test Backend
      run: |
        cd backend
        go test -v ./...

    - name: Build Backend Binary
      run: |
        cd backend
        GOOS=linux GOARCH=amd64 go build -o api cmd/api/main.go

    - name: Deploy to Server via SSH
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "backend/api,backend/deploy/coconut-backend.service"
        target: "/tmp/coconut_deploy"

    - name: Restart Systemd Service
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Stop service if it's already running to prevent 'Text file busy' error
          sudo systemctl stop coconut-backend.service || true

          # Create directory structure
          sudo mkdir -p /opt/coconut/backend

          # Create .env file with default credentials so the app doesn't crash on startup
          # The user should update this manually on the server for production
          sudo bash -c 'cat << EOF > /opt/coconut/backend/.env
          PORT=8080
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF'

          # Remove old binary to ensure clean replace
          sudo rm -f /opt/coconut/backend/api

          # Move binary and set permissions
          sudo mv /tmp/coconut_deploy/backend/api /opt/coconut/backend/api
          sudo chmod +x /opt/coconut/backend/api

          # Move systemd service file
          sudo mv /tmp/coconut_deploy/backend/deploy/coconut-backend.service /etc/systemd/system/coconut-backend.service

          # Reload daemon and restart service
          sudo systemctl daemon-reload
          sudo systemctl enable coconut-backend.service
          sudo systemctl restart coconut-backend.service

          # Clean up
          rm -rf /tmp/coconut_deploy

  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: |
        cd android
        chmod +x gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: android/app/build/outputs/apk/debug/app-debug.apk
        name: Beta Release ${{ github.run_number }}
        tag_name: dev-${{ github.run_number }}
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
