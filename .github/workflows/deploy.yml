name: Build Flutter

on:
  push:
    branches: [ "main", "feature/**", "codex/**", "flutter", "new-reference" ]
    paths: [ "flutter/**" ]
    tags: [ "*" ]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-flutter-android-apk:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Install Flutter dependencies
      run: |
        cd flutter
        flutter pub get

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
      run: |
        cd flutter/android/app
        echo "$ENCODED_STRING" | base64 --decode > debug.keystore

    - name: Build Flutter Debug APK
      run: |
        cd flutter
        flutter build apk --debug \
          --dart-define=BACKEND_URL=http://62.233.43.33:8080

    - name: Rename Flutter APK
      run: |
        mkdir -p build-artifacts
        cp flutter/build/app/outputs/flutter-apk/app-debug.apk build-artifacts/coconut-flutter-debug.apk

    - name: Upload Flutter APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: coconut-flutter-debug
        path: build-artifacts/coconut-flutter-debug.apk

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-flutter-android-apk
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download APK artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts

    - name: Move latest-beta tag to this commit (if not a tag push)
      if: "!startsWith(github.ref, 'refs/tags/')"
      run: |
        git tag -f latest-beta "$GITHUB_SHA"
        git push origin refs/tags/latest-beta --force

    - name: Publish Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "release-artifacts/**/*.apk"
        name: "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Beta' }}"
        tag: "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest-beta' }}"
        body: |
          Release artifacts for Coconut.

          - `coconut-flutter-debug.apk`: migrated Flutter Android build.

          Updated from `${{ github.ref_name }}` at `${{ github.sha }}`.
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
